id: host.privilege_escalation
name: Privilege Escalation Detection
version: "1.0"
description: Detects privilege escalation attempts including SYSTEM/root process spawning from unprivileged parents and token elevation.
domain: host
severity: high
tier: T3
enabled: true

conditions:
  any:
    - field: indicators
      contains: "privilege_escalation"
    - field: indicators
      contains: "root_spawn"
    - field: indicators
      contains: "sudo_invocation"
    - field: indicators
      contains: "setuid_execution"
    - field: indicators
      contains: "token_elevation"
    - field: indicators
      contains: "uac_bypass"

response:
  tier: T3
  actions:
    - type: alert
      target: security_team
      priority: high
    - type: contain
      description: "Isolate process and revoke elevated token"

policy_refs:
  - constitution.safety_over_autonomy
  - openguard-v5.always_block.unapproved_privilege_escalation
