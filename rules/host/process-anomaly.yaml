id: host.process_anomaly
name: Process Anomaly Detection
version: "1.0"
description: Detects unusual process behaviour including suspicious paths, parent-child anomalies, and resource spikes.
domain: host
severity: medium
tier: T2
enabled: true

conditions:
  any:
    - field: indicators
      contains: "suspicious_path"
    - field: indicators
      contains: "unusual_parent_child"
    - field: indicators
      contains: "masquerading"
    - field: metadata.cpu_percent
      gt: 90.0
    - field: metadata.memory_mb
      gt: 2048.0

response:
  tier: T2
  actions:
    - type: alert
      target: security_team
    - type: hold
      description: "Hold process execution pending human review"

policy_refs:
  - constitution.safety_over_autonomy
  - openguard-v5.require_approval.process_termination
