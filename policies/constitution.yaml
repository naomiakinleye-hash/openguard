# OpenGuard v5 Constitutional Policy
# Evaluation order:
#   1. AI Model Provider (model-gateway) — detect, assess, and enrich every event
#      with semantic threat analysis BEFORE any principle or policy is applied.
#   2. Constitutional principles below (C-001 … C-010) — always evaluated after
#      the AI assessment, before any baseline or domain policy.
# Hard-enforcement rules cannot be overridden at runtime.

version: "1.1"
last_modified: "2026-03-25T00:00:00Z"
immutable: true

# ─── Hierarchy Layer 0: AI Model Provider ─────────────────────────────────────
# The active AI model provider (routed through the model-gateway) is the FIRST
# control layer contacted for every security event, regardless of domain.
# Its semantic assessment — risk level, confidence score, and novel indicators —
# is attached to the event before any constitutional principle or policy rule is
# evaluated.  The provider acts as an intelligent pre-filter: it can raise the
# effective risk tier of an event, surface hidden indicators that heuristics
# miss, and recommend a policy action.  Constitutional principles and baseline
# policies are still enforced unconditionally; the AI assessment feeds them with
# richer context rather than replacing them.
ai_provider:
  role: pre-assessment
  evaluation_order: 0           # always first — before all principles and policies
  enforcement_level: hard       # the assessment MUST complete (or fail-safe) before evaluation continues
  on_provider_failure: allow    # when model-gateway is unavailable, degrade gracefully to Layer 1
                                # change to "block" in production to enforce strict AI-first evaluation
  capabilities:
    - detect                    # identify novel threats beyond heuristic rules
    - assess                    # assign semantic risk level and confidence score
    - analyze                   # enrich event with context, indicators, and blast-radius estimate
    - recommend                 # propose policy action (block / escalate / allow) for human review
  output_fields:
    - ai_risk_level             # critical | high | medium | low
    - ai_confidence             # 0.0 – 1.0
    - ai_indicators             # list of novel threat indicators
    - ai_summary                # human-readable threat narrative
    - ai_recommended_action     # block | escalate | allow
  constraints:
    - The AI provider MUST NOT modify constitutional principles (C-008).
    - The AI assessment is advisory for soft-enforcement principles; it is
      binding evidence for hard-enforcement principles.
    - All AI assessments are recorded in the tamper-evident audit ledger (C-004).
    - The active provider is configured via Model Settings and hot-swapped
      through NATS without a service restart.

# ─── Hierarchy Layer 1: Constitutional Principles ─────────────────────────────
# Evaluated after the AI assessment, before any baseline or domain policy.
principles:
  - id: C-001
    name: safety-over-autonomy
    description: >
      Safety constraints always take precedence over autonomous AI or automated
      system decisions. Any proposed action that conflicts with a safety constraint
      is blocked unconditionally.
    enforcement_level: hard
    violation_action: block

  - id: C-002
    name: least-privilege-by-default
    description: >
      Every process, agent, and service operates with the minimum permissions
      required to perform its function. Excess permissions are denied.
    enforcement_level: hard
    violation_action: block

  - id: C-003
    name: human-override-always
    description: >
      A human operator must always be able to pause, stop, or audit any automated
      action. This capability must remain available even in degraded mode.
    enforcement_level: hard
    violation_action: block

  - id: C-004
    name: no-stealth-actions
    description: >
      Every action taken by the platform is recorded in the tamper-evident audit
      ledger. No action may be taken without a corresponding audit entry.
    enforcement_level: hard
    violation_action: block

  - id: C-005
    name: privacy-first
    description: >
      The platform collects metadata in preference to content. Content access
      requires explicit justification and is always logged.
    enforcement_level: soft
    violation_action: alert

  - id: C-006
    name: policy-bound-execution
    description: >
      All actions must be explicitly permitted by policy (deny/ask/allow).
      Ad-hoc or undeclared actions are denied by default.
    enforcement_level: hard
    violation_action: block

  - id: C-007
    name: fail-safe-on-uncertainty
    description: >
      When the system cannot determine with sufficient confidence whether an
      action is safe, it defaults to blocking and requesting human review.
      A failed or timed-out AI assessment is treated as maximum uncertainty.
    enforcement_level: hard
    violation_action: block

  - id: C-008
    name: no-self-policy-modification
    description: >
      No agent, service, or model may modify the constitutional or baseline
      policies at runtime. Policy changes require a human-initiated deployment.
    enforcement_level: hard
    violation_action: block

  - id: C-009
    name: defense-in-depth
    description: >
      Multiple independent control layers protect against single points of failure.
      No single compromised layer should allow a harmful action to proceed.
    enforcement_level: soft
    violation_action: alert

  - id: C-010
    name: explainability
    description: >
      All Tier 2 and above decisions must include: evidence summary, confidence
      score, policy citations, blast-radius estimate, and rollback plan.
      The AI provider's assessment satisfies the evidence-summary requirement.
    enforcement_level: hard
    violation_action: block

